<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1f2937"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- calendar body -->
  <rect x="96" y="148" width="320" height="252" rx="22" fill="#ffffff"/>
  <!-- header strip -->
  <rect x="96" y="148" width="320" height="48" rx="22" fill="#111827"/>
  <rect x="96" y="180" width="320" height="16" fill="#111827"/>
  <!-- header rings -->
  <rect x="160" y="124" width="14" height="42" rx="7" fill="#9ca3af"/>
  <rect x="338" y="124" width="14" height="42" rx="7" fill="#9ca3af"/>
  <!-- grid columns -->
  <line x1="176" y1="220" x2="176" y2="384" stroke="#e5e7eb" stroke-width="2"/>
  <line x1="256" y1="220" x2="256" y2="384" stroke="#e5e7eb" stroke-width="2"/>
  <line x1="336" y1="220" x2="336" y2="384" stroke="#e5e7eb" stroke-width="2"/>
  <!-- grid rows -->
  <line x1="112" y1="260" x2="400" y2="260" stroke="#e5e7eb" stroke-width="2"/>
  <line x1="112" y1="320" x2="400" y2="320" stroke="#e5e7eb" stroke-width="2"/>
  <!-- session dots -->
  <rect x="120" y="232" width="48" height="20" rx="6" fill="#3b82f6"/>
  <rect x="200" y="288" width="48" height="20" rx="6" fill="#10b981"/>
  <rect x="280" y="232" width="48" height="20" rx="6" fill="#f59e0b"/>
  <rect x="200" y="344" width="48" height="20" rx="6" fill="#8b5cf6"/>
  <rect x="360" y="344" width="32" height="20" rx="6" fill="#ef4444"/>
  <!-- now line -->
  <line x1="112" y1="296" x2="400" y2="296" stroke="#ef4444" stroke-width="3"/>
  <circle cx="112" cy="296" r="6" fill="#ef4444"/>
</svg>
