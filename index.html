<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PT 스케줄러</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>
<body>
<header class="topbar">
  <h1>PT 스케줄러</h1>
  <nav>
    <button data-view="calendar" class="active">캘린더</button>
    <button data-view="import">가져오기</button>
    <button data-view="members">회원</button>
  </nav>
</header>

<main>
  <section id="view-calendar" class="view active">
    <div class="toolbar">
      <div class="toolbar-left">
        <button id="btn-prev" title="이전">←</button>
        <span id="period-label"></span>
        <button id="btn-next" title="다음">→</button>
        <button id="btn-today">오늘</button>
      </div>
      <div class="toolbar-right">
        <select id="view-mode" title="뷰">
          <option value="week">주간</option>
          <option value="month">월간</option>
        </select>
        <select id="member-filter" title="회원 필터">
          <option value="">전체 회원</option>
        </select>
        <button id="btn-export">JPG 저장</button>
        <button id="btn-export-all" title="모든 회원을 개별 JPG로 저장">회원별 일괄</button>
      </div>
    </div>
    <div id="calendar" class="calendar-canvas"></div>
  </section>

  <section id="view-import" class="view">
    <div class="tabs">
      <button data-tab="typing" class="active">타이핑</button>
      <button data-tab="csv">CSV</button>
      <button data-tab="xlsx" hidden>Excel</button>
    </div>

    <div id="tab-typing" class="tab active">
      <form id="form-typing" class="grid-form">
        <label>회원명<input name="name" required placeholder="예: 김민수"></label>
        <label>날짜<input type="date" name="date" required></label>
        <label>시작 시간<input type="time" name="start" required></label>
        <label>소요(분)<input type="number" name="duration" value="50" min="10" step="5" required></label>
        <button type="submit">미리보기에 추가</button>
      </form>
    </div>

    <div id="tab-csv" class="tab">
      <p class="hint">헤더: <code>member_name, date, start_time, duration_min</code> (또는 한국어 <code>회원명, 날짜, 시작시간, 소요시간</code>)</p>
      <div class="row-actions">
        <button type="button" id="btn-sample-csv">샘플 CSV 다운로드</button>
      </div>
      <input type="file" id="file-csv" accept=".csv,text/csv">
    </div>

    <div id="tab-xlsx" class="tab" hidden>
      <p class="hint">첫 시트의 1행을 헤더로 사용합니다. 컬럼명은 CSV와 동일.</p>
      <input type="file" id="file-xlsx" accept=".xlsx,.xls">
    </div>

    <div id="preview" class="preview hidden">
      <h3>미리보기 <span id="preview-count" class="hint"></span></h3>
      <p class="hint">행을 직접 수정할 수 있습니다. 잘못된 행은 삭제 버튼으로 제거하세요. 모두 입력했으면 아래 <b>확정</b> 버튼을 누르면 캘린더로 이동합니다.</p>
      <div class="preview-table-wrap">
        <table id="preview-table"></table>
      </div>
      <div class="preview-actions">
        <button id="btn-confirm">확정</button>
        <button id="btn-cancel">취소</button>
      </div>
    </div>
  </section>

  <section id="view-members" class="view">
    <form id="form-member" class="grid-form">
      <label>회원명<input name="name" required></label>
      <label>색상<input type="color" name="color" value="#3b82f6"></label>
      <label>메모(선택)<input name="memo" placeholder="특이사항, 부상 이력 등"></label>
      <button type="submit">회원 추가</button>
    </form>
    <ul id="member-list" class="member-list"></ul>
  </section>
</main>

<dialog id="modal-session" class="modal">
  <div class="modal-content">
    <button class="modal-close" data-close aria-label="닫기">&times;</button>
    <h3 id="ms-title">수업</h3>
    <div id="ms-body" class="modal-body"></div>
    <div class="modal-actions">
      <button type="button" id="ms-edit-member">회원 편집</button>
      <button type="button" id="ms-delete" class="danger">수업 삭제</button>
      <button type="button" data-close>닫기</button>
    </div>
  </div>
</dialog>

<dialog id="modal-member" class="modal">
  <div class="modal-content">
    <button class="modal-close" data-close aria-label="닫기">&times;</button>
    <h3>회원 정보</h3>
    <div class="modal-body">
      <label>이름<input id="mm-name" type="text" required></label>
      <label>색상<input id="mm-color" type="color"></label>
      <label>메모<textarea id="mm-memo" rows="5" placeholder="특이사항, 부상, 컨디션, 목표 등"></textarea></label>
      <p id="mm-stats" class="hint"></p>
    </div>
    <div class="modal-actions">
      <button type="button" id="mm-delete" class="danger">회원 삭제</button>
      <button type="button" id="mm-save" class="primary">저장</button>
      <button type="button" data-close>닫기</button>
    </div>
  </div>
</dialog>

<script type="module" src="js/app.js"></script>
</body>
</html>
